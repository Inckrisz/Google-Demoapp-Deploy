name: CI Deploy

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    uses: ./.github/workflows/terraform-apply.yml
    secrets: inherit

  docker:
    needs: terraform
    uses: ./.github/workflows/docker-build-push.yml
    secrets: inherit

  scale-up:
    needs: docker
    uses: ./.github/workflows/scale-ecs.yml
    with:
      desired_count: "1"
    secrets: inherit